<!DOCTYPE html>
<html lang="ja">

<head>

  <meta charset="UTF-8">
  <title>ゲームレビューサイト(仮)</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <div class="site-container">
    <header class="site-header">
      <div style="display: flex;" id="header"></div>
  
      <form class="search-form">
        <input type="text" class="search-input" placeholder="キーワードを入力...">
        <button type="submit" class="search-button">検索</button>
      </form>
    </header>
    <script src="js/include_header.js"></script>

    <main class="main-content">
      <section id="AttractingAttention">
        <h1>＜REVIEW＞</h1>
        <div class="card-grid" id="card-container"></div>
      </section>
    
     
      <div class="split-area">
        <section class="left" id="GameGenre">
          <h2>Game Genre</h2>
          <div class="genre-list">
            <a href="adventure.html" class="genre-button">Adventure</a>
            <a href="fps.html" class="genre-button">FPS</a>
            <a href="horror.html" class="genre-button">Horror</a>
            <a href="rpg.html" class="genre-button">RPG</a>          
            <a href="puzzle.html" class="genre-button">Puzzle</a>
            <a href="music.html" class="genre-button">Music</a> 
          </div>
        </section>

        <section class="right" id="LatestReviews">
          <h2>Latest Reviews</h2>
        </section>
      </div>
      
    </main>
    <aside class="sidebar">
      <div>
        <h2>Contents</h2>
        <div class="contents">
          <a href="#AttractingAttentio">現在の最も注目されているゲーム</a>
          <a href="#GameGenre">Game Genre</a>
          <a href="#LatestReviews">Latest Reviews</a>
        </div>
      </div>
      <div id="sidebar"></div>
    </aside>
    
    <script src="js/include.js"></script>
  </div>

  <script src="reviews-data.js"></script>

  <script>
    window.addEventListener('DOMContentLoaded', () => {
      const container = document.getElementById('card-container');
      const searchForm = document.querySelector('.search-form');
      const searchInput = document.querySelector('.search-input');

      if (!container || typeof reviewsData === 'undefined') return;

      function displayReviews(filteredReviews) {
        container.innerHTML = ''; 

        if (filteredReviews.length === 0) {
          container.innerHTML = '<p style="color: #ccc; padding: 20px;">一致するレビューが見つかりませんでした。</p>';
          return;
        }

        filteredReviews.forEach(review => {
          const cardHtml = `
            <a href="review.html?id=${review.id}" class="review-card">
              <div class="card-image">
                <img src="${review.image}" alt="${review.title}">
              </div>
              <div class="card-title">
                ${review.title}
              </div>
            </a>
          `;
          container.insertAdjacentHTML('beforeend', cardHtml);
        });
      }

      const defaultReviews = [...reviewsData].sort(() => 0.5 - Math.random()).slice(0, 5);
      displayReviews(defaultReviews);

      searchForm.addEventListener('submit', (e) => {
        e.preventDefault(); 
        
        const keyword = searchInput.value.trim().toLowerCase(); 

        if (keyword === '') {
          displayReviews(defaultReviews);
          return;
        }
        const matchedReviews = reviewsData.filter(review => {
          return review.title.toLowerCase().includes(keyword);
        });

        displayReviews(matchedReviews);
      });
    });
  </script>
  
</body>

</html>
