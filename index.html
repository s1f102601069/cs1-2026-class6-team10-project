<!DOCTYPE html>
<html lang="ja">

<head>

  <meta charset="UTF-8">
  <title>未定</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <div class="site-container">
    <header class="site-header">
      <div style="display: flex;" id="header"></div>
  
      <form class="search-form">
        <input type="text" class="search-input" placeholder="キーワードを入力...">
        <button type="submit" class="search-button">検索</button>
      </form>
    </header>
    <script src="js/include_header.js"></script>

    <main class="main-content">
      <section>
        <h1>現在の最も注目されているゲーム</h1>
        <div class="card-grid" id="card-container"></div>
      </section>
    
     
      <div class="split-area">
        <section class="left">
          <h2>Game Genre</h2>
          <div class="genre-list">
            <a href="adventure.html" class="genre-button">Adventure</a>
            <a href="fps.html" class="genre-button">FPS</a>
            <a href="horror.html" class="genre-button">Horror</a>
            <a href="rpg.html" class="genre-button">RPG</a>          
            <a href="puzzle.html" class="genre-button">Puzzle</a>
            <a href="music.html" class="genre-button">Music</a> 
          </div>
        </section>

        <section class="right">
          <h2>Latest Reviews</h2>
        </section>
      </div>
      
    </main>
    <aside class="sidebar">
      <div id="sidebar"></div>
    </aside>
    
    <script src="js/include.js"></script>
  </div>

  <script src="reviews-data.js"></script>
  <script>
    const container = document.getElementById('card-container');

    if (container && typeof reviewsData !== 'undefined') {
      const shuffledReviews = [...reviewsData].sort(() => 0.5 - Math.random());
      const pickupReviews = shuffledReviews.slice(0, 5);

      pickupReviews.forEach(review => {
        const cardHtml = `
          <a href="review.html?id=${review.id}" class="review-card">
            <div class="card-image">
              <img src="${review.image}" alt="${review.title}">
            </div>
            <div class="card-title">
              ${review.title}
            </div>
          </a>
        `;
        container.insertAdjacentHTML('beforeend', cardHtml);
      });
    }
  </script>
  
</body>

</html>
