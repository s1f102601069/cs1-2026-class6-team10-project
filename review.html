<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title></title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="site-container">

    <header class="site-header">
      <h1 style="font-size: 20px;">ゲーム情報サイト</h1>
    </header>

    <main class="main-content">
      <article style="padding: 10px 0;">
        <h2 id="review-title" style="font-size: 28px; margin-bottom: 10px; color: #ffffff;">読み込み中...</h2>
        
        <p style="font-size: 14px; color: #aaa; margin-bottom: 20px;">
          投稿日: <span id="review-date">-</span> | 
          ジャンル: <span id="review-category" style="background: rgba(255,255,255,0.1); padding: 2px 8px; border-radius: 4px;">-</span>
        </p>
        
      <hr style="border: 0; border-top: 1px solid rgba(255, 255, 255, 0.08); margin-bottom: 30px;">

      <div id="review-image-container" class="detail-image-box"></div>

      <div id="review-content" style="font-size: 16px; line-height: 1.8; color: #e0e0e0; letter-spacing: 0.05em;">
          
        </div>
      </article>

    </main>

    <aside class="sidebar">
      
    </aside>

  </div>

  <script src="reviews-data.js"></script>
  
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const reviewId = urlParams.get('id');

    const currentReview = reviewsData.find(review => review.id === reviewId);

    if (currentReview) {
      document.getElementById('review-title').textContent = currentReview.title;
      document.getElementById('review-date').textContent = currentReview.date;
      document.getElementById('review-category').textContent = currentReview.category;
      document.getElementById('review-content').innerHTML = currentReview.content.replace(/\n/g, '<br>'); 
      document.title = currentReview.title;
      const imageContainer = document.getElementById('review-image-container');
    if (imageContainer) {
      imageContainer.innerHTML = `<img src="${currentReview.image}" alt="${currentReview.title}">`;
      }
    } else {
      document.getElementById('review-title').textContent = "レビューが見つかりませんでした";
      document.getElementById('review-content').textContent = "URLを確認するか、トップページからアクセスし直してください。";
    }
  </script>
</body>
</html>
